<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моя выгода</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 390px;
            margin: 0 auto;
        }

        .screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .back-btn {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            margin-left: -175px; /* half of 390/2 offset */
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: #222;
            text-decoration: none;
            z-index: 100;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div class="screen">
    <img src="cashback.jpg" alt="Моя выгода">
</div>

<a href="main.html" class="back-btn">‹</a>

</body>
</html>
