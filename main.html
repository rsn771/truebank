<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InvestSim — Главный</title>
    <!-- Preload nav images to prevent flash on tab switch -->
    <link rel="preload" href="nav.jpg" as="image">
    <link rel="preload" href="nav-history.jpg" as="image">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: #f0f2f7;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            max-width: 390px;
            margin: 0 auto;
            min-height: 100vh;
        }

        .content { padding-bottom: 84px; }

        /* ── Header ── */
        .header {
            padding: 16px 16px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f0f2f7;
        }

        .avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: #dde0ea;
            display: flex; align-items: center; justify-content: center;
            color: #9298a8; flex-shrink: 0;
        }

        .header-name-block { flex: 1; }

        .header-name {
            font-size: 20px; font-weight: 700; color: #14172b;
            display: flex; align-items: center; gap: 4px;
        }

        .header-name .arrow {
            color: #9298a8; font-size: 16px; font-weight: 400;
        }

        .header-sub {
            font-size: 13px; color: #9298a8; margin-top: 1px;
        }

        .cashback-btn {
            background: #4cd964;
            border: none; border-radius: 20px;
            padding: 8px 14px;
            font-size: 14px; font-weight: 600; color: #fff;
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            font-family: inherit;
            white-space: nowrap;
        }

        /* ── Cards ── */
        .cards-section { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

        .card {
            background: #fff;
            border-radius: 22px;
            padding: 16px;
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .card-label { font-size: 14px; color: #8890a8; margin-bottom: 6px; }
        .card-amount { font-size: 19px; font-weight: 700; color: #14172b; }

        /* Account card with mini bank card */
        .card-account {
            display: flex; align-items: flex-start; justify-content: space-between;
        }

        .mini-card {
            width: 54px; height: 34px;
            border-radius: 6px;
            background: #e8001c;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 3px 4px;
        }

        .mini-card-logo {
            font-size: 8px; font-weight: 600; color: #000;
            text-decoration: underline;
            text-decoration-thickness: 1.4px;
            text-underline-offset: 1px;
            align-self: flex-start;
        }

        .mini-card-bottom {
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .mini-card-num {
            font-size: 6.5px; font-weight: 600; color: rgba(255,255,255,0.9);
        }

        .mini-card-system {
            font-size: 5px; font-weight: 700; color: #fff;
            background: rgba(255,255,255,0.25);
            border-radius: 3px;
            padding: 1px 3px;
        }

        /* Savings card with badge */
        .card-savings-header {
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .rate-badge {
            background: #eef0f8;
            border-radius: 10px;
            padding: 3px 9px;
            font-size: 13px; font-weight: 700; color: #8890a8;
            flex-shrink: 0;
        }

        .income-banner {
            margin: 12px -16px 0;
            background: #e8f8f0;
            padding: 10px 16px 12px;
            font-size: 13px; color: #14172b;
            font-weight: 500;
            border-radius: 0 0 18px 18px;
        }

        .income-banner span { font-weight: 700; }

        /* Deposit card */
        .card-deposit-header {
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .close-btn {
            color: #b0b6c8; font-size: 20px; cursor: pointer;
            line-height: 1; padding: 0 2px;
            background: none; border: none;
        }

        .deposit-banner {
            margin: 12px -16px 0;
            background: #eef2ff;
            padding: 10px 16px 12px;
            font-size: 13px; color: #14172b;
            font-weight: 500;
            border-radius: 0 0 18px 18px;
        }

        /* ── Scroll chevron ── */
        .scroll-hint {
            display: flex; justify-content: center;
            padding: 14px 0 6px;
        }

        .scroll-hint svg { color: #c0c6d8; }

        /* ── Search bar ── */
        .search-bar {
            margin: 4px 16px 16px;
            background: #fff;
            border-radius: 14px;
            padding: 12px 14px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }

        .search-input {
            flex: 1; border: none; outline: none;
            font-size: 15px; color: #9298a8;
            background: transparent;
            font-family: inherit;
        }

        .qr-btn {
            width: 32px; height: 32px;
            border: 1.5px solid #dde0ea;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
        }

        /* ── Promo cards ── */
        .promo-scroll {
            padding: 0 16px;
            display: flex; gap: 12px;
            overflow-x: auto; scrollbar-width: none;
        }
        .promo-scroll::-webkit-scrollbar { display: none; }

        .promo-card {
            min-width: 168px;
            height: 180px;
            border-radius: 18px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            cursor: pointer;
        }

        .promo-card-1 { background: linear-gradient(140deg, #7c6ef5 0%, #a78bfa 100%); }
        .promo-card-2 { background: linear-gradient(140deg, #6366f1 0%, #818cf8 100%); }
        .promo-card-3 { background: linear-gradient(140deg, #4f72f5 0%, #38bdf8 100%); }

        .promo-illustration {
            position: absolute; top: 0; right: 0; left: 0;
            height: 112px;
            display: flex; align-items: center; justify-content: center;
            font-size: 52px;
        }

        .promo-text {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 10px 12px 12px;
        }

        .promo-title {
            font-size: 14px; font-weight: 700; color: #fff;
            line-height: 1.3;
        }

        .promo-sub {
            font-size: 12px; color: rgba(255,255,255,0.75);
            margin-top: 2px;
        }

        /* ── Bottom nav ── */
        .bottom-nav {
            position: fixed; bottom: 0;
            left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 390px;
            z-index: 10;
            display: block;
            position: fixed;
        }

        .nav-hit {
            position: absolute;
            top: 0; bottom: 0;
            width: 20%;
            display: block;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            user-select: none;
        }
        .nav-hit:nth-child(2) { left: 0%; }
        .nav-hit:nth-child(3) { left: 20%; }
        .nav-hit:nth-child(4) { left: 40%; }
        .nav-hit:nth-child(5) { left: 60%; }
        .nav-hit:nth-child(6) { left: 80%; }
    </style>
</head>
<body>
<div class="content">

    <!-- Header -->
    <div class="header">
        <div class="avatar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
        </div>
        <div class="header-name-block">
            <div class="header-name">Артём <span class="arrow">›</span></div>
            <div class="header-sub">Альфа-Смарт</div>
        </div>
        <a href="cashback.html" class="cashback-btn" style="text-decoration:none;">🎁 Кэшбэк</a>
    </div>

    <!-- Cards -->
    <div class="cards-section">

        <!-- Current Account -->
        <div class="card">
            <div class="card-account">
                <div>
                    <div class="card-label">Текущий счёт</div>
                    <div class="card-amount">228 504,74 ₽</div>
                </div>
                <div class="mini-card">
                    <div class="mini-card-logo">А</div>
                    <div class="mini-card-bottom">
                        <div class="mini-card-num">7507</div>
                        <div class="mini-card-system">МИР</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Savings Account -->
        <div class="card" style="padding-bottom:0; overflow:hidden;">
            <div class="card-savings-header">
                <div>
                    <div class="card-label">Альфа-Счёт на минимальный остаток</div>
                    <div class="card-amount" style="font-size:19px;">560 784,56 ₽</div>
                </div>
                <div class="rate-badge">4%</div>
            </div>
            <div class="income-banner">
                Начислен доход за месяц <span>68,43 ₽</span>
            </div>
        </div>

        <!-- Deposit Offer -->
        <div class="card" style="padding-bottom:0; overflow:hidden;" id="depositCard">
            <div class="card-deposit-header">
                <div>
                    <div class="card-label">Альфа-Вклад</div>
                    <div class="card-amount" style="font-size:19px;">От 10 000 ₽</div>
                </div>
                <button class="close-btn" onclick="document.getElementById('depositCard').remove()">×</button>
            </div>
            <div class="deposit-banner">
                От 2 месяцев до 3 лет
            </div>
        </div>

    </div>

    <!-- Scroll chevron -->
    <div class="scroll-hint">
        <svg width="48" height="12" viewBox="0 0 48 12" fill="none">
            <path d="M2 3l22 8 22-8" stroke="#c0c6d8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>


</div>

<!-- Promo Image -->
<div id="promoBox" style="position:fixed; left:50%; transform:translateX(-50%); width:100%; max-width:390px; z-index:5;">
    <img src="promo.jpg" alt="Промо" style="width:100%; border-radius:18px 18px 0 0; display:block;">
</div>

<script>
    function positionPromo() {
        const nav = document.querySelector('.bottom-nav');
        const box = document.getElementById('promoBox');
        const navH = nav.offsetHeight;
        box.style.bottom = navH + 'px';
    }
    window.addEventListener('load', positionPromo);
    window.addEventListener('resize', positionPromo);
</script>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <img src="nav.jpg" alt="nav" style="width:100%; display:block;">
    <a href="main.html" class="nav-hit"></a>
    <a href="main.html" class="nav-hit"></a>
    <a href="main.html" class="nav-hit"></a>
    <a href="index.html" class="nav-hit"></a>
    <a href="main.html" class="nav-hit"></a>
</div>

</body>
</html>
